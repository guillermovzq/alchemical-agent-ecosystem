<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" width="1440" height="900">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="100%" stop-color="#050505"/>
    </linearGradient>
    <linearGradient id="sidebar-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#12121a"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1440" height="900" fill="url(#bg)"/>

  <!-- Sidebar -->
  <rect x="0" y="0" width="260" height="900" fill="url(#sidebar-grad)" opacity="0.95"/>
  <rect x="259" y="0" width="1" height="900" fill="#d4af37" opacity="0.2"/>

  <!-- Logo -->
  <text x="24" y="40" fill="#d4af37" font-family="Georgia, serif" font-size="18" font-weight="bold" filter="url(#glow)">◈ ALCHEMICAL</text>

  <!-- Nav Items -->
  <g transform="translate(0,80)">
    <text x="24" y="28" fill="#8a8a8a" font-family="system-ui" font-size="13">◆ Chat del Caldero</text>
  </g>
  <g transform="translate(0,140)">
    <text x="24" y="28" fill="#8a8a8a" font-family="system-ui" font-size="13">◇ Node Studio</text>
  </g>
  <g transform="translate(0,200)">
    <text x="24" y="28" fill="#8a8a8a" font-family="system-ui" font-size="13">○ Runtime Agentes</text>
  </g>
  <g transform="translate(0,260)">
    <text x="24" y="28" fill="#8a8a8a" font-family="system-ui" font-size="13">▸ Logs & SSE</text>
  </g>
  <g transform="translate(0,320)">
    <rect x="12" y="0" width="236" height="44" rx="8" fill="#d4af37" opacity="0.15"/>
    <rect x="0" y="8" width="3" height="28" rx="1.5" fill="#d4af37"/>
    <text x="24" y="28" fill="#d4af37" font-family="system-ui" font-size="13" font-weight="600">⚙ Administración</text>
  </g>

  <!-- Stats -->
  <g transform="translate(24,780)">
    <text x="0" y="0" fill="#666" font-family="system-ui" font-size="10">CPU</text>
    <text x="0" y="16" fill="#d4af37" font-family="system-ui" font-size="14" font-weight="600">42%</text>
    <rect x="0" y="24" width="100" height="4" rx="2" fill="#d4af37"/>
  </g>

  <!-- Header -->
  <rect x="260" y="0" width="1180" height="64" fill="#0a0a0f" opacity="0.8"/>
  <rect x="260" y="63" width="1180" height="1" fill="#d4af37" opacity="0.1"/>

  <!-- Search -->
  <rect x="284" y="16" width="280" height="32" rx="8" fill="#12121a" stroke="#d4af37" stroke-opacity="0.2" stroke-width="1"/>
  <text x="300" y="36" fill="#666" font-family="system-ui" font-size="13">Buscar...</text>

  <!-- Main Content - Admin -->
  <rect x="284" y="88" width="1132" height="788" rx="12" fill="#0d0d12" stroke="#d4af37" stroke-opacity="0.1" stroke-width="1"/>

  <!-- Title -->
  <text x="308" y="120" fill="#d4af37" font-family="system-ui" font-size="16" font-weight="600">Administración del Sistema</text>

  <!-- System Status Card -->
  <g transform="translate(308, 150)">
    <rect width="340" height="180" rx="12" fill="#12121a" stroke="#d4af37" stroke-opacity="0.2"/>
    <text x="24" y="36" fill="#d4af37" font-family="system-ui" font-size="14" font-weight="600">Estado del Sistema</text>
    <rect x="24" y="50" width="292" height="1" fill="#d4af37" opacity="0.2"/>

    <text x="24" y="85" fill="#8a8a8a" font-family="system-ui" font-size="12">Gateway</text>
    <text x="120" y="85" fill="#22c55e" font-family="system-ui" font-size="12">● Online</text>
    <text x="220" y="85" fill="#e8e6e3" font-family="system-ui" font-size="12">v2.1.0</text>

    <text x="24" y="115" fill="#8a8a8a" font-family="system-ui" font-size="12">Dashboard</text>
    <text x="120" y="115" fill="#22c55e" font-family="system-ui" font-size="12">● Online</text>
    <text x="220" y="115" fill="#e8e6e3" font-family="system-ui" font-size="12">v2026.2.0</text>

    <text x="24" y="145" fill="#8a8a8a" font-family="system-ui" font-size="12">Database</text>
    <text x="120" y="145" fill="#22c55e" font-family="system-ui" font-size="12">● Online</text>
    <text x="220" y="145" fill="#e8e6e3" font-family="system-ui" font-size="12">PostgreSQL 15</text>
  </g>

  <!-- Security Card -->
  <g transform="translate(668, 150)">
    <rect width="340" height="180" rx="12" fill="#12121a" stroke="#b87333" stroke-opacity="0.2"/>
    <text x="24" y="36" fill="#d4af37" font-family="system-ui" font-size="14" font-weight="600">Seguridad</text>
    <rect x="24" y="50" width="292" height="1" fill="#d4af37" opacity="0.2"/>

    <text x="24" y="85" fill="#8a8a8a" font-family="system-ui" font-size="12">API Keys Activas</text>
    <text x="220" y="85" fill="#d4af37" font-family="system-ui" font-size="12" font-weight="600">5</text>

    <text x="24" y="115" fill="#8a8a8a" font-family="system-ui" font-size="12">Rate Limit</text>
    <text x="220" y="115" fill="#d4af37" font-family="system-ui" font-size="12">1000 req/min</text>

    <text x="24" y="145" fill="#8a8a8a" font-family="system-ui" font-size="12">SSL/TLS</text>
    <text x="220" y="145" fill="#22c55e" font-family="system-ui" font-size="12">Habilitado</text>
  </g>

  <!-- Performance Card -->
  <g transform="translate(1028, 150)">
    <rect width="360" height="180" rx="12" fill="#12121a" stroke="#cd7f32" stroke-opacity="0.2"/>
    <text x="24" y="36" fill="#d4af37" font-family="system-ui" font-size="14" font-weight="600">Rendimiento</text>
    <rect x="24" y="50" width="312" height="1" fill="#d4af37" opacity="0.2"/>

    <text x="24" y="85" fill="#8a8a8a" font-family="system-ui" font-size="12">CPU Usage</text>
    <rect x="120" y="75" width="100" height="8" rx="4" fill="#222"/>
    <rect x="120" y="75" width="42" height="8" rx="4" fill="#d4af37"/>
    <text x="230" y="85" fill="#d4af37" font-family="system-ui" font-size="12">42%</text>

    <text x="24" y="115" fill="#8a8a8a" font-family="system-ui" font-size="12">Memory</text>
    <rect x="120" y="105" width="100" height="8" rx="4" fill="#222"/>
    <rect x="120" y="105" width="65" height="8" rx="4" fill="#b87333"/>
    <text x="230" y="115" fill="#b87333" font-family="system-ui" font-size="12">3.2GB</text>

    <text x="24" y="145" fill="#8a8a8a" font-family="system-ui" font-size="12">Disk</text>
    <rect x="120" y="135" width="100" height="8" rx="4" fill="#222"/>
    <rect x="120" y="135" width="25" height="8" rx="4" fill="#22c55e"/>
    <text x="230" y="145" fill="#22c55e" font-family="system-ui" font-size="12">24%</text>
  </g>

  <!-- Operations Section -->
  <g transform="translate(308, 360)">
    <rect width="1080" height="220" rx="12" fill="#12121a" stroke="#d4af37" stroke-opacity="0.2"/>
    <text x="24" y="40" fill="#d4af37" font-family="system-ui" font-size="14" font-weight="600">Operaciones</text>
    <rect x="24" y="55" width="1032" height="1" fill="#d4af37" opacity="0.2"/>

    <!-- Buttons -->
    <g transform="translate(24, 80)">
      <rect width="140" height="44" rx="8" fill="#d4af37"/>
      <text x="30" y="28" fill="#050505" font-family="system-ui" font-size="13" font-weight="600">🔄 Reiniciar</text>
    </g>

    <g transform="translate(180, 80)">
      <rect width="160" height="44" rx="8" fill="#12121a" stroke="#b87333" stroke-width="1"/>
      <text x="20" y="28" fill="#e8e6e3" font-family="system-ui" font-size="13">🧹 Limpiar Caché</text>
    </g>

    <g transform="translate(360, 80)">
      <rect width="180" height="44" rx="8" fill="#12121a" stroke="#ef4444" stroke-width="1"/>
      <text x="20" y="28" fill="#ef4444" font-family="system-ui" font-size="13">⚠ Modo Mantenimiento</text>
    </g>

    <g transform="translate(560, 80)">
      <rect width="160" height="44" rx="8" fill="#12121a" stroke="#3b82f6" stroke-width="1"/>
      <text x="20" y="28" fill="#3b82f6" font-family="system-ui" font-size="13">📥 Backup Ahora</text>
    </g>

    <!-- Danger Zone -->
    <g transform="translate(24, 150)">
      <text x="0" y="0" fill="#ef4444" font-family="system-ui" font-size="12" font-weight="600">⚠ Zona de Peligro</text>
      <rect x="0" y="15" width="200" height="44" rx="8" fill="#ef4444" opacity="0.2" stroke="#ef4444" stroke-width="1"/>
      <text x="20" y="43" fill="#ef4444" font-family="system-ui" font-size="13">🗑 Resetear Todo</text>
    </g>
  </g>

  <!-- API Configuration -->
  <g transform="translate(308, 610)">
    <rect width="520" height="200" rx="12" fill="#12121a" stroke="#d4af37" stroke-opacity="0.2"/>
    <text x="24" y="36" fill="#d4af37" font-family="system-ui" font-size="14" font-weight="600">Configuración API</text>
    <rect x="24" y="50" width="472" height="1" fill="#d4af37" opacity="0.2"/>

    <text x="24" y="85" fill="#8a8a8a" font-family="system-ui" font-size="12">Endpoint Base</text>
    <rect x="24" y="95" width="472" height="36" rx="6" fill="#0a0a0f" stroke="#d4af37" stroke-opacity="0.3"/>
    <text x="36" y="118" fill="#e8e6e3" font-family="monospace" font-size="12">https://api.alchemical.local/v1</text>

    <text x="24" y="155" fill="#8a8a8a" font-family="system-ui" font-size="12">API Key</text>
    <rect x="24" y="165" width="472" height="36" rx="6" fill="#0a0a0f" stroke="#d4af37" stroke-opacity="0.3"/>
    <text x="36" y="188" fill="#666" font-family="monospace" font-size="12">alc_•••••••••••••••••••••••••••</text>
  </g>

  <!-- Environment Info -->
  <g transform="translate(848, 610)">
    <rect width="540" height="200" rx="12" fill="#12121a" stroke="#b87333" stroke-opacity="0.2"/>
    <text x="24" y="36" fill="#d4af37" font-family="system-ui" font-size="14" font-weight="600">Información del Entorno</text>
    <rect x="24" y="50" width="492" height="1" fill="#d4af37" opacity="0.2"/>

    <text x="24" y="85" fill="#8a8a8a" font-family="system-ui" font-size="12">Node.js</text>
    <text x="200" y="85" fill="#e8e6e3" font-family="monospace" font-size="12">v20.11.0</text>

    <text x="24" y="115" fill="#8a8a8a" font-family="system-ui" font-size="12">Next.js</text>
    <text x="200" y="115" fill="#e8e6e3" font-family="monospace" font-size="12">v15.2.0</text>

    <text x="24" y="145" fill="#8a8a8a" font-family="system-ui" font-size="12">React</text>
    <text x="200" y="145" fill="#e8e6e3" font-family="monospace" font-size="12">v19.0.0</text>

    <text x="24" y="175" fill="#8a8a8a" font-family="system-ui" font-size="12">Entorno</text>
    <text x="200" y="175" fill="#22c55e" font-family="monospace" font-size="12">production</text>
  </g>
</svg>