<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" width="1440" height="900">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="100%" stop-color="#050505"/>
    </linearGradient>
    <linearGradient id="sidebar-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#12121a"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1" fill="#d4af37" opacity="0.2"/>
    </pattern>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1440" height="900" fill="url(#bg)"/>

  <!-- Sidebar -->
  <rect x="0" y="0" width="260" height="900" fill="url(#sidebar-grad)" opacity="0.95"/>
  <rect x="259" y="0" width="1" height="900" fill="#d4af37" opacity="0.2"/>

  <!-- Logo -->
  <text x="24" y="40" fill="#d4af37" font-family="Georgia, serif" font-size="18" font-weight="bold" filter="url(#glow)">◈ ALCHEMICAL</text>

  <!-- Nav Items -->
  <g transform="translate(0,80)">
    <text x="24" y="28" fill="#8a8a8a" font-family="system-ui" font-size="13">◆ Chat del Caldero</text>
  </g>
  <g transform="translate(0,140)">
    <rect x="12" y="0" width="236" height="44" rx="8" fill="#d4af37" opacity="0.15"/>
    <rect x="0" y="8" width="3" height="28" rx="1.5" fill="#d4af37"/>
    <text x="24" y="28" fill="#d4af37" font-family="system-ui" font-size="13" font-weight="600">◇ Node Studio</text>
  </g>
  <g transform="translate(0,200)">
    <text x="24" y="28" fill="#8a8a8a" font-family="system-ui" font-size="13">○ Runtime Agentes</text>
  </g>
  <g transform="translate(0,260)">
    <text x="24" y="28" fill="#8a8a8a" font-family="system-ui" font-size="13">▸ Logs & SSE</text>
  </g>
  <g transform="translate(0,320)">
    <text x="24" y="28" fill="#8a8a8a" font-family="system-ui" font-size="13">⚙ Administración</text>
  </g>

  <!-- Stats -->
  <g transform="translate(24,780)">
    <text x="0" y="0" fill="#666" font-family="system-ui" font-size="10">CPU</text>
    <text x="0" y="16" fill="#d4af37" font-family="system-ui" font-size="14" font-weight="600">42%</text>
    <rect x="0" y="24" width="100" height="4" rx="2" fill="#d4af37"/>
  </g>

  <!-- Header -->
  <rect x="260" y="0" width="1180" height="64" fill="#0a0a0f" opacity="0.8"/>
  <rect x="260" y="63" width="1180" height="1" fill="#d4af37" opacity="0.1"/>

  <!-- Search -->
  <rect x="284" y="16" width="280" height="32" rx="8" fill="#12121a" stroke="#d4af37" stroke-opacity="0.2" stroke-width="1"/>
  <text x="300" y="36" fill="#666" font-family="system-ui" font-size="13">Buscar agentes...</text>

  <!-- Main Content - Node Studio -->
  <rect x="284" y="88" width="1132" height="788" rx="12" fill="#0d0d12" stroke="#d4af37" stroke-opacity="0.1" stroke-width="1"/>

  <!-- Grid -->
  <rect x="284" y="88" width="1132" height="788" rx="12" fill="url(#grid)" opacity="0.5"/>

  <!-- Toolbar -->
  <g transform="translate(308, 112)">
    <rect width="200" height="40" rx="8" fill="#12121a" stroke="#d4af37" stroke-opacity="0.2"/>
    <text x="16" y="25" fill="#e8e6e3" font-family="system-ui" font-size="12">+ Agregar Nodo</text>
    <text x="120" y="25" fill="#22c55e" font-family="system-ui" font-size="12">▶ Ejecutar</text>
  </g>

  <!-- Nodes -->
  <!-- Input Node -->
  <g transform="translate(400, 250)">
    <rect width="140" height="70" rx="12" fill="#12121a" stroke="#d4af37" stroke-width="2" filter="url(#glow)"/>
    <circle cx="20" cy="35" r="10" fill="#d4af37" opacity="0.3"/>
    <circle cx="20" cy="35" r="6" fill="#d4af37"/>
    <text x="40" y="30" fill="#e8e6e3" font-family="system-ui" font-size="13" font-weight="600">Trigger</text>
    <text x="40" y="48" fill="#8a8a8a" font-family="system-ui" font-size="10">Input</text>
    <circle cx="140" cy="35" r="4" fill="#d4af37"/>
  </g>

  <!-- Process Node 1 -->
  <g transform="translate(650, 300)">
    <rect width="160" height="70" rx="12" fill="#12121a" stroke="#b87333" stroke-width="2"/>
    <circle cx="20" cy="35" r="10" fill="#b87333" opacity="0.3"/>
    <circle cx="20" cy="35" r="6" fill="#b87333"/>
    <text x="40" y="30" fill="#e8e6e3" font-family="system-ui" font-size="13" font-weight="600">Velktharion</text>
    <text x="40" y="48" fill="#8a8a8a" font-family="system-ui" font-size="10">Prima Materia</text>
    <circle cx="0" cy="35" r="4" fill="#b87333"/>
    <circle cx="160" cy="35" r="4" fill="#b87333"/>
  </g>

  <!-- Process Node 2 -->
  <g transform="translate(650, 450)">
    <rect width="160" height="70" rx="12" fill="#12121a" stroke="#cd7f32" stroke-width="2"/>
    <circle cx="20" cy="35" r="10" fill="#cd7f32" opacity="0.3"/>
    <circle cx="20" cy="35" r="6" fill="#cd7f32"/>
    <text x="40" y="30" fill="#e8e6e3" font-family="system-ui" font-size="13" font-weight="600">Synapsara</text>
    <text x="40" y="48" fill="#8a8a8a" font-family="system-ui" font-size="10">Tejedor</text>
    <circle cx="0" cy="35" r="4" fill="#cd7f32"/>
    <circle cx="160" cy="35" r="4" fill="#cd7f32"/>
  </g>

  <!-- Output Node -->
  <g transform="translate(950, 375)">
    <rect width="140" height="70" rx="12" fill="#12121a" stroke="#22c55e" stroke-width="2"/>
    <circle cx="20" cy="35" r="10" fill="#22c55e" opacity="0.3"/>
    <circle cx="20" cy="35" r="6" fill="#22c55e"/>
    <text x="40" y="30" fill="#e8e6e3" font-family="system-ui" font-size="13" font-weight="600">Resultado</text>
    <text x="40" y="48" fill="#8a8a8a" font-family="system-ui" font-size="10">Output</text>
    <circle cx="0" cy="35" r="4" fill="#22c55e"/>
  </g>

  <!-- Connection Lines -->
  <line x1="540" y1="285" x2="650" y2="335" stroke="#d4af37" stroke-width="2" stroke-dasharray="5,3" opacity="0.6">
    <animate attributeName="stroke-dashoffset" from="0" to="16" dur="1s" repeatCount="indefinite"/>
  </line>
  <line x1="710" y1="370" x2="710" y2="450" stroke="#b87333" stroke-width="2" stroke-dasharray="5,3" opacity="0.6">
    <animate attributeName="stroke-dashoffset" from="0" to="16" dur="1s" repeatCount="indefinite"/>
  </line>
  <line x1="810" y1="485" x2="950" y2="410" stroke="#cd7f32" stroke-width="2" stroke-dasharray="5,3" opacity="0.6">
    <animate attributeName="stroke-dashoffset" from="0" to="16" dur="1s" repeatCount="indefinite"/>
  </line>

  <!-- Properties Panel -->
  <g transform="translate(1200, 120)">
    <rect width="200" height="400" rx="8" fill="#12121a" stroke="#d4af37" stroke-opacity="0.2"/>
    <text x="16" y="30" fill="#d4af37" font-family="system-ui" font-size="14" font-weight="600">Propiedades</text>
    <rect x="16" y="50" width="168" height="1" fill="#d4af37" opacity="0.2"/>

    <text x="16" y="80" fill="#8a8a8a" font-family="system-ui" font-size="11">Nombre</text>
    <text x="16" y="100" fill="#e8e6e3" font-family="system-ui" font-size="13">Velktharion</text>

    <text x="16" y="130" fill="#8a8a8a" font-family="system-ui" font-size="11">Modelo</text>
    <text x="16" y="150" fill="#e8e6e3" font-family="system-ui" font-size="13">llama3.2</text>

    <text x="16" y="180" fill="#8a8a8a" font-family="system-ui" font-size="11">Temperatura</text>
    <rect x="16" y="195" width="100" height="6" rx="3" fill="#222"/>
    <rect x="16" y="195" width="70" height="6" rx="3" fill="#d4af37"/>
  </g>

  <!-- Title -->
  <text x="308" y="120" fill="#d4af37" font-family="system-ui" font-size="16" font-weight="600">Agent Node Studio</text>
  <text x="500" y="120" fill="#8a8a8a" font-family="system-ui" font-size="13">◈ Workflow: Análisis de Logs</text>
</svg>