<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" width="1440" height="900">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="100%" stop-color="#050505"/>
    </linearGradient>
    <linearGradient id="sidebar-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#12121a"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </linearGradient>
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#b8960c"/>
      <stop offset="50%" stop-color="#d4af37"/>
      <stop offset="100%" stop-color="#b8960c"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1440" height="900" fill="url(#bg)"/>

  <!-- Animated particles -->
  <g opacity="0.3">
    <circle cx="200" cy="150" r="2" fill="#d4af37">
      <animate attributeName="opacity" values="0.2;0.6;0.2" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="800" cy="300" r="1.5" fill="#d4af37">
      <animate attributeName="opacity" values="0.1;0.5;0.1" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1200" cy="200" r="2" fill="#b87333">
      <animate attributeName="opacity" values="0.2;0.4;0.2" dur="3.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Sidebar -->
  <rect x="0" y="0" width="260" height="900" fill="url(#sidebar-grad)" opacity="0.95"/>
  <rect x="259" y="0" width="1" height="900" fill="#d4af37" opacity="0.2"/>

  <!-- Logo -->
  <text x="24" y="40" fill="#d4af37" font-family="Georgia, serif" font-size="18" font-weight="bold" filter="url(#glow)">◈ ALCHEMICAL</text>

  <!-- Nav Items -->
  <g transform="translate(0,80)">
    <rect x="12" y="0" width="236" height="44" rx="8" fill="#d4af37" opacity="0.15"/>
    <rect x="0" y="8" width="3" height="28" rx="1.5" fill="#d4af37"/>
    <text x="24" y="28" fill="#d4af37" font-family="system-ui" font-size="14" font-weight="600">◆ Chat del Caldero</text>
  </g>
  <g transform="translate(0,140)">
    <text x="24" y="28" fill="#8a8a8a" font-family="system-ui" font-size="13">◇ Node Studio</text>
  </g>
  <g transform="translate(0,200)">
    <text x="24" y="28" fill="#8a8a8a" font-family="system-ui" font-size="13">○ Runtime Agentes</text>
  </g>
  <g transform="translate(0,260)">
    <text x="24" y="28" fill="#8a8a8a" font-family="system-ui" font-size="13">▸ Logs & SSE</text>
  </g>
  <g transform="translate(0,320)">
    <text x="24" y="28" fill="#8a8a8a" font-family="system-ui" font-size="13">⚙ Administración</text>
  </g>

  <!-- Stats -->
  <g transform="translate(24,780)">
    <text x="0" y="0" fill="#666" font-family="system-ui" font-size="10">CPU</text>
    <text x="0" y="16" fill="#d4af37" font-family="system-ui" font-size="14" font-weight="600">42%</text>
    <rect x="0" y="24" width="100" height="4" rx="2" fill="#d4af37"/>
    <rect x="100" y="24" width="112" height="4" rx="2" fill="#222"/>

    <text x="0" y="48" fill="#666" font-family="system-ui" font-size="10">MEM</text>
    <text x="0" y="64" fill="#d4af37" font-family="system-ui" font-size="14" font-weight="600">3.2 GB</text>
    <rect x="0" y="72" width="140" height="4" rx="2" fill="#b87333"/>
    <rect x="140" y="72" width="72" height="4" rx="2" fill="#222"/>
  </g>

  <!-- Header -->
  <rect x="260" y="0" width="1180" height="64" fill="#0a0a0f" opacity="0.8"/>
  <rect x="260" y="63" width="1180" height="1" fill="#d4af37" opacity="0.1"/>

  <!-- Search -->
  <rect x="284" y="16" width="280" height="32" rx="8" fill="#12121a" stroke="#d4af37" stroke-opacity="0.2" stroke-width="1"/>
  <text x="300" y="36" fill="#666" font-family="system-ui" font-size="13">Buscar agentes, skills...</text>

  <!-- Status -->
  <g transform="translate(1100, 20)">
    <circle cx="0" cy="8" r="6" fill="#22c55e" opacity="0.8"/>
    <text x="14" y="12" fill="#8a8a8a" font-family="system-ui" font-size="12">7/7 Agentes</text>
  </g>

  <!-- Main Content - Chat -->
  <rect x="284" y="88" width="1132" height="788" rx="12" fill="#0d0d12" stroke="#d4af37" stroke-opacity="0.1" stroke-width="1"/>

  <!-- Chat Messages -->
  <g transform="translate(308, 120)">
    <!-- User Message -->
    <rect x="400" y="0" width="320" height="60" rx="12" fill="#b87333" opacity="0.15"/>
    <text x="416" y="28" fill="#e8e6e3" font-family="system-ui" font-size="13">Analiza los logs del sistema y detecta anomalías</text>

    <!-- Agent Response -->
    <rect x="0" y="80" width="520" height="80" rx="12" fill="#12121a" stroke="#d4af37" stroke-width="1" stroke-opacity="0.3"/>
    <rect x="0" y="80" width="3" height="80" rx="1.5" fill="#d4af37"/>
    <text x="20" y="30" fill="#f0d070" font-family="system-ui" font-size="13" font-weight="500">Velktharion:</text>
    <text x="20" y="55" fill="#e8e6e3" font-family="system-ui" font-size="13">He analizado 1,247 líneas de logs. Detecté 3 patrones</text>
    <text x="20" y="75" fill="#e8e6e3" font-family="system-ui" font-size="13">de anomalías en el servicio de autenticación.</text>
  </g>

  <!-- Input Area -->
  <g transform="translate(308, 780)">
    <rect width="1084" height="72" rx="12" fill="#12121a" stroke="#d4af37" stroke-opacity="0.3" stroke-width="1"/>
    <text x="20" y="42" fill="#666" font-family="system-ui" font-size="14">Escribe tu mensaje...</text>
    <rect x="980" y="16" width="80" height="40" rx="8" fill="#d4af37"/>
    <text x="1000" y="42" fill="#050505" font-family="system-ui" font-size="12" font-weight="600">ENVIAR</text>
  </g>

  <!-- Title -->
  <text x="308" y="120" fill="#d4af37" font-family="system-ui" font-size="16" font-weight="600">Chat del Caldero</text>
</svg>