<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" width="1440" height="900">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="100%" stop-color="#050505"/>
    </linearGradient>
    <linearGradient id="sidebar-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#12121a"/>
      <stop offset="100%" stop-color="#0a0a0f"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1440" height="900" fill="url(#bg)"/>

  <!-- Sidebar -->
  <rect x="0" y="0" width="260" height="900" fill="url(#sidebar-grad)" opacity="0.95"/>
  <rect x="259" y="0" width="1" height="900" fill="#d4af37" opacity="0.2"/>

  <!-- Logo -->
  <text x="24" y="40" fill="#d4af37" font-family="Georgia, serif" font-size="18" font-weight="bold" filter="url(#glow)">◈ ALCHEMICAL</text>

  <!-- Nav Items -->
  <g transform="translate(0,80)">
    <text x="24" y="28" fill="#8a8a8a" font-family="system-ui" font-size="13">◆ Chat del Caldero</text>
  </g>
  <g transform="translate(0,140)">
    <text x="24" y="28" fill="#8a8a8a" font-family="system-ui" font-size="13">◇ Node Studio</text>
  </g>
  <g transform="translate(0,200)">
    <text x="24" y="28" fill="#8a8a8a" font-family="system-ui" font-size="13">○ Runtime Agentes</text>
  </g>
  <g transform="translate(0,260)">
    <rect x="12" y="0" width="236" height="44" rx="8" fill="#d4af37" opacity="0.15"/>
    <rect x="0" y="8" width="3" height="28" rx="1.5" fill="#d4af37"/>
    <text x="24" y="28" fill="#d4af37" font-family="system-ui" font-size="13" font-weight="600">▸ Logs &amp; SSE</text>
  </g>
  <g transform="translate(0,320)">
    <text x="24" y="28" fill="#8a8a8a" font-family="system-ui" font-size="13">⚙ Administración</text>
  </g>

  <!-- Stats -->
  <g transform="translate(24,780)">
    <text x="0" y="0" fill="#666" font-family="system-ui" font-size="10">CPU</text>
    <text x="0" y="16" fill="#d4af37" font-family="system-ui" font-size="14" font-weight="600">42%</text>
    <rect x="0" y="24" width="100" height="4" rx="2" fill="#d4af37"/>
  </g>

  <!-- Header -->
  <rect x="260" y="0" width="1180" height="64" fill="#0a0a0f" opacity="0.8"/>
  <rect x="260" y="63" width="1180" height="1" fill="#d4af37" opacity="0.1"/>

  <!-- Search -->
  <rect x="284" y="16" width="280" height="32" rx="8" fill="#12121a" stroke="#d4af37" stroke-opacity="0.2" stroke-width="1"/>
  <text x="300" y="36" fill="#666" font-family="system-ui" font-size="13">Filtrar logs...</text>

  <!-- Main Content - Logs -->
  <rect x="284" y="88" width="1132" height="788" rx="12" fill="#0d0d12" stroke="#d4af37" stroke-opacity="0.1" stroke-width="1"/>

  <!-- Title -->
  <text x="308" y="120" fill="#d4af37" font-family="system-ui" font-size="16" font-weight="600">Logs &amp; Telemetría</text>
  <text x="1050" y="120" fill="#22c55e" font-family="system-ui" font-size="12">
    <animate attributeName="opacity" values="1;0.5;1" dur="1s" repeatCount="indefinite"/>● STREAMING
  </text>

  <!-- Log Controls -->
  <g transform="translate(308, 140)">
    <rect width="80" height="28" rx="6" fill="#12121a" stroke="#d4af37" stroke-opacity="0.2"/>
    <text x="16" y="19" fill="#e8e6e3" font-family="system-ui" font-size="11">Todos</text>

    <rect x="90" y="0" width="80" height="28" rx="6" fill="#12121a" opacity="0.5"/>
    <text x="106" y="19" fill="#8a8a8a" font-family="system-ui" font-size="11">Info</text>

    <rect x="180" y="0" width="80" height="28" rx="6" fill="#12121a" opacity="0.5"/>
    <text x="196" y="19" fill="#8a8a8a" font-family="system-ui" font-size="11">Warn</text>

    <rect x="270" y="0" width="80" height="28" rx="6" fill="#12121a" opacity="0.5"/>
    <text x="286" y="19" fill="#8a8a8a" font-family="system-ui" font-size="11">Error</text>
  </g>

  <!-- Log Entries -->
  <g transform="translate(308, 190)">
    <!-- Log 1 -->
    <rect width="1084" height="44" rx="4" fill="#12121a" opacity="0.3"/>
    <text x="16" y="26" fill="#666" font-family="monospace" font-size="11">10:42:15</text>
    <rect x="100" y="12" width="12" height="12" rx="2" fill="#3b82f6" opacity="0.3"/>
    <text x="103" y="22" fill="#3b82f6" font-family="system-ui" font-size="9" font-weight="bold">I</text>
    <text x="124" y="26" fill="#e8e6e3" font-family="monospace" font-size="12">[Velktharion] Agent initialized with model llama3.2</text>

    <!-- Log 2 -->
    <g transform="translate(0, 52)">
      <rect width="1084" height="44" rx="4" fill="#12121a" opacity="0.5"/>
      <text x="16" y="26" fill="#666" font-family="monospace" font-size="11">10:42:18</text>
      <rect x="100" y="12" width="12" height="12" rx="2" fill="#22c55e" opacity="0.3"/>
      <text x="103" y="22" fill="#22c55e" font-family="system-ui" font-size="9" font-weight="bold">S</text>
      <text x="124" y="26" fill="#e8e6e3" font-family="monospace" font-size="12">[Workflow] Execution completed successfully: 245ms</text>
    </g>

    <!-- Log 3 -->
    <g transform="translate(0, 104)">
      <rect width="1084" height="44" rx="4" fill="#12121a" opacity="0.3"/>
      <text x="16" y="26" fill="#666" font-family="monospace" font-size="11">10:42:22</text>
      <rect x="100" y="12" width="12" height="12" rx="2" fill="#f59e0b" opacity="0.3"/>
      <text x="103" y="22" fill="#f59e0b" font-family="system-ui" font-size="9" font-weight="bold">W</text>
      <text x="124" y="26" fill="#e8e6e3" font-family="monospace" font-size="12">[System] High memory usage detected: 78% (threshold: 75%)</text>
    </g>

    <!-- Log 4 -->
    <g transform="translate(0, 156)">
      <rect width="1084" height="44" rx="4" fill="#12121a" opacity="0.5"/>
      <text x="16" y="26" fill="#666" font-family="monospace" font-size="11">10:42:25</text>
      <rect x="100" y="12" width="12" height="12" rx="2" fill="#3b82f6" opacity="0.3"/>
      <text x="103" y="22" fill="#3b82f6" font-family="system-ui" font-size="9" font-weight="bold">I</text>
      <text x="124" y="26" fill="#e8e6e3" font-family="monospace" font-size="12">[Gateway] SSE connection established: /api/logs/stream</text>
    </g>

    <!-- Log 5 -->
    <g transform="translate(0, 208)">
      <rect width="1084" height="44" rx="4" fill="#12121a" opacity="0.3"/>
      <text x="16" y="26" fill="#666" font-family="monospace" font-size="11">10:42:30</text>
      <rect x="100" y="12" width="12" height="12" rx="2" fill="#ef4444" opacity="0.3"/>
      <text x="103" y="22" fill="#ef4444" font-family="system-ui" font-size="9" font-weight="bold">E</text>
      <text x="124" y="26" fill="#e8e6e3" font-family="monospace" font-size="12">[Synapsara] Request timeout: Response time exceeded 30s</text>
    </g>

    <!-- Log 6 -->
    <g transform="translate(0, 260)">
      <rect width="1084" height="44" rx="4" fill="#12121a" opacity="0.5"/>
      <text x="16" y="26" fill="#666" font-family="monospace" font-size="11">10:42:33</text>
      <rect x="100" y="12" width="12" height="12" rx="2" fill="#22c55e" opacity="0.3"/>
      <text x="103" y="22" fill="#22c55e" font-family="system-ui" font-size="9" font-weight="bold">S</text>
      <text x="124" y="26" fill="#e8e6e3" font-family="monospace" font-size="12">[Kryonexus] Health check passed: All systems operational</text>
    </g>

    <!-- Log 7 -->
    <g transform="translate(0, 312)">
      <rect width="1084" height="44" rx="4" fill="#12121a" opacity="0.3"/>
      <text x="16" y="26" fill="#666" font-family="monospace" font-size="11">10:42:38</text>
      <rect x="100" y="12" width="12" height="12" rx="2" fill="#3b82f6" opacity="0.3"/>
      <text x="103" y="22" fill="#3b82f6" font-family="system-ui" font-size="9" font-weight="bold">I</text>
      <text x="124" y="26" fill="#e8e6e3" font-family="monospace" font-size="12">[Cache] Redis cache cleared: 1,247 entries removed</text>
    </g>
  </g>

  <!-- Metrics Panel -->
  <g transform="translate(308, 560)">
    <rect width="350" height="200" rx="12" fill="#12121a" stroke="#d4af37" stroke-opacity="0.2"/>
    <text x="24" y="36" fill="#d4af37" font-family="system-ui" font-size="14" font-weight="600">Métricas en Tiempo Real</text>

    <!-- Mini chart -->
    <polyline points="24,160 60,140 100,150 140,120 180,130 220,110 260,100 300,90" fill="none" stroke="#d4af37" stroke-width="2"/>
    <circle cx="300" cy="90" r="4" fill="#d4af37">
      <animate attributeName="r" values="4;6;4" dur="1s" repeatCount="indefinite"/>
    </circle>

    <text x="24" y="180" fill="#8a8a8a" font-family="system-ui" font-size="11">Requests/min: 1,247</text>
    <text x="200" y="180" fill="#8a8a8a" font-family="system-ui" font-size="11">Avg: 42ms</text>
  </g>

  <!-- Actions -->
  <g transform="translate(1050, 140)">
    <rect width="120" height="32" rx="6" fill="#12121a" stroke="#d4af37" stroke-opacity="0.3"/>
    <text x="24" y="21" fill="#d4af37" font-family="system-ui" font-size="11">⬇ Descargar</text>
  </g>
</svg>