<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Alchemical robot stirring a cauldron">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B1020"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22D3EE"/>
      <stop offset="100%" stop-color="#A855F7"/>
    </linearGradient>
    <linearGradient id="brew" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#34D399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="48" fill="url(#bg)"/>

  <!-- Cauldron -->
  <ellipse cx="256" cy="360" rx="130" ry="42" fill="#111827" stroke="#334155" stroke-width="6"/>
  <rect x="126" y="280" width="260" height="80" rx="36" fill="#0F172A" stroke="#475569" stroke-width="6"/>
  <ellipse cx="256" cy="280" rx="130" ry="28" fill="#0B1224" stroke="#64748B" stroke-width="6"/>
  <ellipse cx="256" cy="282" rx="112" ry="20" fill="url(#brew)" opacity="0.95"/>

  <!-- Potion bubbles -->
  <circle cx="220" cy="250" r="8" fill="#6EE7B7"/>
  <circle cx="264" cy="242" r="6" fill="#A7F3D0"/>
  <circle cx="296" cy="252" r="7" fill="#6EE7B7"/>

  <!-- Robot body -->
  <rect x="188" y="140" width="136" height="114" rx="20" fill="#1F2937" stroke="#60A5FA" stroke-width="6"/>
  <rect x="208" y="96" width="96" height="70" rx="14" fill="#111827" stroke="#93C5FD" stroke-width="6"/>
  <circle cx="236" cy="130" r="10" fill="#22D3EE"/>
  <circle cx="276" cy="130" r="10" fill="#A855F7"/>
  <rect x="236" y="152" width="40" height="8" rx="4" fill="#38BDF8"/>

  <!-- Antenna -->
  <line x1="256" y1="96" x2="256" y2="68" stroke="#94A3B8" stroke-width="6"/>
  <circle cx="256" cy="60" r="10" fill="url(#glow)"/>

  <!-- Arm + spoon -->
  <line x1="324" y1="190" x2="392" y2="232" stroke="#94A3B8" stroke-width="12" stroke-linecap="round"/>
  <line x1="392" y1="232" x2="344" y2="286" stroke="#94A3B8" stroke-width="10" stroke-linecap="round"/>
  <ellipse cx="334" cy="292" rx="16" ry="10" fill="#CBD5E1"/>

  <!-- Magical vapors -->
  <path d="M170 220 C150 190, 190 170, 176 142" stroke="#67E8F9" stroke-width="5" fill="none" stroke-linecap="round" opacity="0.9"/>
  <path d="M334 224 C360 194, 328 170, 346 142" stroke="#C4B5FD" stroke-width="5" fill="none" stroke-linecap="round" opacity="0.9"/>

  <!-- Mark -->
  <text x="256" y="460" text-anchor="middle" fill="#E2E8F0" font-size="30" font-family="Segoe UI, Arial" font-weight="700">ALCHEMICAL ECOSYSTEM</text>
</svg>
