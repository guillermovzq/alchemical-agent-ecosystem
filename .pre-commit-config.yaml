# 🔮 Alchemical Pre-commit Hooks (Local-First)
# Toda la validación se ejecuta localmente, sin depender de GitHub Actions
# Instalar: pip install pre-commit && pre-commit install
# Ejecutar manualmente: pre-commit run --all-files

repos:
  # ============================================
  # 🔒 Security Hooks (Built-in)
  # ============================================
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: detect-private-key
        name: 🔑 Detect Private Keys
        description: Prevents committing private keys
      
      - id: check-added-large-files
        name: 📦 Check Large Files
        args: ['--maxkb=500']
      
      - id: check-merge-conflict
        name: ⚔️ Check Merge Conflicts
      
      - id: check-case-conflict
        name: 🔤 Check Case Conflicts

  # ============================================
  # 🐍 Python Hooks
  # ============================================
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.0
    hooks:
      - id: ruff
        name: 🧹 Ruff Lint
        args: [--fix, --select, E,W,F, --ignore, E501]
        files: ^(gateway|services|shared)/.*\.py$
      
      - id: ruff-format
        name: ✨ Ruff Format
        files: ^(gateway|services|shared)/.*\.py$

  # ============================================
  # 📝 General Hooks
  # ============================================
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
        name: ✂️ Trailing Whitespace
        exclude: ^\.git/
      
      - id: end-of-file-fixer
        name: 📄 End of File Fixer
        exclude: ^\.git/
      
      - id: check-yaml
        name: ✅ YAML Check
      
      - id: check-json
        name: ✅ JSON Check
      
      - id: check-toml
        name: ✅ TOML Check

  # ============================================
  # 🐳 Docker Hooks
  # ============================================
  - repo: https://github.com/hadolint/hadolint
    rev: v2.12.0
    hooks:
      - id: hadolint-docker
        name: 🐳 Dockerfile Lint
        files: Dockerfile$

  # ============================================
  # 🔮 Alchemical Custom Validation
  # ============================================
  - repo: local
    hooks:
      - id: alchemical-python-syntax
        name: 🐍 Alchemical Python Syntax Check
        entry: python -m py_compile
        language: system
        files: ^(gateway|services)/.*\.py$
        pass_filenames: true
        description: Validates Python syntax for gateway and services

      - id: alchemical-tsconfig-check
        name: 📘 Alchemical TypeScript Config Check
        entry: bash -c 'grep -q "\"strict\": true" apps/alchemical-dashboard/tsconfig.json 2>/dev/null || (echo "TypeScript strict mode not enabled!" && exit 1)'
        language: system
        pass_filenames: false
        files: tsconfig\.json$
        description: Ensures TypeScript strict mode is enabled

# ============================================
# 📋 Notas de Uso
# ============================================
# Para ejecutar validación completa local:
#   - Windows PowerShell: .\scripts\alchemical-local-ci.ps1
#   - Linux/Mac/Git Bash: ./scripts/alchemical-local-ci.sh
#
# Para validación rápida antes de commit:
#   pre-commit run --all-files
#
# Para instalar hooks:
#   pip install pre-commit
#   pre-commit install
