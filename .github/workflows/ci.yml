name: 🔮 Alchemical CI

on:
  push:
    branches: [main, 'release/**', 'feat/**']
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '20'

jobs:
  # ============================================
  # 🔒 Security & Quality Gates
  # ============================================
  security-scan:
    name: 🔒 Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: 🔍 Detect Secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --debug --only-verified

  # ============================================
  # ⚡ Backend Validation
  # ============================================
  backend-lint:
    name: 🐍 Backend Lint & Type Check
    runs-on: ubuntu-latest
    needs: security-scan
    env:
      PYTHONPATH: .
    steps:
      - uses: actions/checkout@v4
      
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: 💾 Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('gateway/requirements.txt', 'gateway/requirements-dev.txt') }}
      
      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r gateway/requirements.txt
          pip install ruff==0.8.0 mypy==1.13.0 types-redis==4.6.0.20241004
      
      - name: 🧹 Ruff lint check
        run: ruff check gateway/ shared/ --select E,W,F --ignore E501
      
      - name: 📘 MyPy type check
        run: mypy gateway/app.py --ignore-missing-imports --no-strict-optional

  backend-build:
    name: ⚙️ Backend Build Check
    runs-on: ubuntu-latest
    needs: backend-lint
    steps:
      - uses: actions/checkout@v4
      
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: 🔨 Syntax check - Gateway
        run: python -m py_compile gateway/app.py
      
      - name: 🔨 Syntax check - Services
        run: |
          python -m py_compile services/temporaeth/app.py \
            services/resonvyr/app.py \
            services/kryonexus/app.py \
            services/fluxenrath/app.py \
            services/auralith/app.py \
            services/synapsara/app.py \
            services/noctumbra-mail/app.py

  backend-test:
    name: 🧪 Backend Tests
    runs-on: ubuntu-latest
    needs: backend-build
    steps:
      - uses: actions/checkout@v4
      
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: 💾 Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('gateway/requirements.txt') }}
      
      - name: 📦 Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r gateway/requirements.txt
          pip install pytest==8.3.0 pytest-asyncio==0.24.0 httpx==0.27.0
      
      - name: 🧪 Run tests
        run: pytest -q tests/test_gateway_api.py

  # ============================================
  # 🎨 Frontend Validation
  # ============================================
  frontend-lint:
    name: 🎨 Frontend Lint
    runs-on: ubuntu-latest
    needs: security-scan
    steps:
      - uses: actions/checkout@v4
      
      - name: ⬢ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: 💾 Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('apps/alchemical-dashboard/package-lock.json') }}
      
      - name: 📦 Install dependencies
        run: cd apps/alchemical-dashboard && npm ci
      
      - name: 🧹 ESLint check
        run: cd apps/alchemical-dashboard && npm run lint

  frontend-typecheck:
    name: 📘 Frontend TypeScript Strict
    runs-on: ubuntu-latest
    needs: frontend-lint
    steps:
      - uses: actions/checkout@v4
      
      - name: ⬢ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: 💾 Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('apps/alchemical-dashboard/package-lock.json') }}
      
      - name: 📦 Install dependencies
        run: cd apps/alchemical-dashboard && npm ci
      
      - name: 🔍 TypeScript strict check
        run: cd apps/alchemical-dashboard && npx tsc --noEmit

  frontend-build:
    name: 🏗️ Frontend Build
    runs-on: ubuntu-latest
    needs: frontend-typecheck
    steps:
      - uses: actions/checkout@v4
      
      - name: ⬢ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      
      - name: 💾 Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('apps/alchemical-dashboard/package-lock.json') }}
      
      - name: 📦 Install dependencies
        run: cd apps/alchemical-dashboard && npm ci
      
      - name: 🏗️ Production build
        run: cd apps/alchemical-dashboard && npm run build

  # ============================================
  # 🐳 Infrastructure Validation
  # ============================================
  compose-validation:
    name: 🐳 Docker Compose Validation
    runs-on: ubuntu-latest
    needs: [backend-build, frontend-build]
    steps:
      - uses: actions/checkout@v4
      
      - name: 🔍 Validate compose file
        run: docker compose config > /tmp/compose.validated.yml
      
      - name: 📊 Show compose services
        run: docker compose config --services

  # ============================================
  # 🛡️ Security Scorecard
  # ============================================
  scorecard:
    name: 🛡️ Security Scorecard
    permissions:
      security-events: write
      id-token: write
      contents: read
      actions: read
    runs-on: ubuntu-latest
    needs: security-scan
    steps:
      - uses: actions/checkout@v4
      
      - name: 🛡️ Run Scorecard
        uses: ossf/scorecard-action@v2.3.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: false

  # ============================================
  # ✅ Final Status
  # ============================================
  ci-success:
    name: ✅ CI Success
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build, compose-validation, scorecard]
    steps:
      - name: 🎉 All checks passed
        run: echo "✅ All Alchemical CI checks passed!"
